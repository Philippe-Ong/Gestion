    <!-- Content Security Policy — défense en profondeur.
         'unsafe-inline' sur script/style est conservé à titre transitoire tant
         que les gestionnaires inline (onclick, onchange, blocs <script>) ne sont
         pas tous migrés vers la délégation d'événements centralisée (app.js).

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; worker-src 'self' blob:">

    <!-- JSZip & XLSX : utilisés par exportBLExcel / exportArchivesExcel / importClients -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" integrity="sha384-vtjasyidUo0kW94K5MXDXntzOJpQgBKXmE7e2Ga4LG0skTTLeBi97eFAXsqewJjw" crossorigin="anonymous"></script>
    <!-- Firebase SDK (v12.16.0) — App, Firestore, Auth
         Les clés Firebase côté client sont publiques par conception.
         N'ajoutez PAS de clés serveur ici.
         L'authentification utilise un compte technique fixe gestion@thecol.ch
         (Email/Password). Le mot de passe est saisi par l'utilisateur, jamais
         stocké dans le code. La session est persistée via browserLocalPersistence
         pour un démarrage hors ligne quand le SDK est déjà chargé. -->
    <script>
        window.firebaseReady = false;
    </script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js';
        import {
            getFirestore, doc, setDoc, getDoc, getDocs, collection,
            onSnapshot, deleteDoc, writeBatch, runTransaction
        } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js';
        import {
            getAuth, signInWithEmailAndPassword, signOut,
            onAuthStateChanged, setPersistence, browserLocalPersistence
        } from 'https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js';

        const FIREBASE_AUTH_EMAIL = 'gestion@thecol.ch';
        
        const firebaseConfig = {
            apiKey: "AIzaSyDnENEDX6e9P3KLkuY85qTpSNuAUy3Cb7Y",
            authDomain: "thecol-gestion.firebaseapp.com",
            projectId: "thecol-gestion",
            storageBucket: "thecol-gestion.firebasestorage.app",
            messagingSenderId: "882272705805",
            appId: "1:882272705805:web:542b45499ff27b12a4e444",
            measurementId: "G-E67CGE3Y57"
        };

        let app, db, auth;
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);

            // Persister la session dans IndexedDB (permet le démarrage hors ligne
            // si le SDK est déjà chargé)
            setPersistence(auth, browserLocalPersistence).catch(() => {});

            // Exposer Firestore (une seule fois — app.js ne doit jamais
            // ré-importer le SDK au runtime car un import dynamique échoue hors-ligne)
            window.firebaseApi = {
                doc, setDoc, getDoc, getDocs, collection,
                onSnapshot, deleteDoc, writeBatch, runTransaction
            };
            window.firebaseDb = db;

            // Exposer Auth de façon minimale : aucune fuite de l'email technique
            // ni du mot de passe. Seules les fonctions nécessaires sont exposées.
            window.firebaseAuth = {
                signIn: (password) => signInWithEmailAndPassword(auth, FIREBASE_AUTH_EMAIL, password),
                signOut: () => signOut(auth),
                isAuthenticated: () => !!(auth && auth.currentUser)
            };

            // Le bouton Sync n'est visible qu'après authentification
            window.showSyncButton = () => {
                const btn = document.getElementById('syncBtn');
                if (btn) btn.style.display = 'inline-flex';
            };

            // Surveiller l'état d'authentification — firebaseReady ne devient
            // true qu'après une session active. Tant que l'utilisateur n'est
            // pas connecté, aucune opération Firestore ni vue métier ne démarre.
            const loginScreen = document.getElementById('loginScreen');
            const loginLoading = document.getElementById('loginLoading');
            const loginForm = document.getElementById('loginForm');
            const loginPassword = document.getElementById('loginPassword');
            const loginError = document.getElementById('loginError');
            const loginBusy = document.getElementById('loginBusy');
            const loginBtn = document.getElementById('loginBtn');

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    // Session active (restaurée depuis la persistance ou
                    // connexion réussie)
                    window.firebaseReady = true;

                    // Déverrouiller le shell : visible, accessible aux
                    // lecteurs d'écran, masquer l'écran de connexion
                    if (typeof window.unlockShell === 'function') {
                        window.unlockShell();
                    }

                    // Masquer l'écran de verrouillage
                    if (loginScreen) loginScreen.style.display = 'none';

                    // Réinitialiser le formulaire pour la prochaine déconnexion
                    if (loginPassword) loginPassword.value = '';
                    if (loginError) loginError.textContent = '';
                    if (loginError) loginError.style.display = 'none';
                    if (loginBusy) loginBusy.style.display = 'none';
                    if (loginBtn) loginBtn.style.display = 'inline-flex';

                    // Afficher le bouton Sync dans l'en-tête
                    window.showSyncButton?.();

                    // Lancer l'application (local d'abord, puis Firebase)
                    if (typeof window.startApp === 'function') {
                        window.startApp();
                    }

                    console.log('Authentifié — session active');
                } else {
                    // Aucune session active — transition centralisée
                    if (typeof window.resetAppSession === 'function') {
                        window.resetAppSession();
                    }
                    console.log('Déconnecté — écran de verrouillage');
                }
            });

            console.log('Firebase connecté (App + Auth + Firestore)');
        } catch(e) {
            console.log('Erreur Firebase:', e);
            window.firebaseReady = false;
            // Verrouiller le shell (body--locked est déjà dans le HTML,
            // mais on le ré-applique par sécurité)
            if (typeof window.lockShell === 'function') {
                window.lockShell();
            }
            // En cas d'échec, afficher le formulaire de connexion avec une erreur
            const el = document.getElementById('loginLoading');
            if (el) el.style.display = 'none';
            const form = document.getElementById('loginForm');
            if (form) form.style.display = 'block';
            const err = document.getElementById('loginError');
            if (err) { err.textContent = 'Erreur de connexion au service. Vérifiez votre réseau.'; err.style.display = 'block'; }
        }
    </script>
    <script src="app.js?v=11.8"></script>
